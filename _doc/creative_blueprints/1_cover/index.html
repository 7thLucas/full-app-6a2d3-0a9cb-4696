<style>
  .mode-landscape .sl-layout { display: flex; flex-direction: row; align-items: stretch; min-height: 100%; }
  .mode-landscape .sl-content { width: 55%; display: flex; flex-direction: column; justify-content: space-between; }
  .mode-landscape .sl-visual  { width: 45%; min-height: 0; }
  .mode-portrait  .sl-layout { display: flex; flex-direction: column; min-height: 100%; }
  .mode-portrait  .sl-content { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
  .mode-portrait  .sl-visual  { min-height: 260px; flex-shrink: 0; }
  .mode-landscape .sl-headline { font-size: 3.25rem; }
  .mode-portrait  .sl-headline { font-size: 2rem; }
</style>

<section class="w-full h-full overflow-auto bg-white">
  <div class="sl-layout h-full">

    <!-- Content column -->
    <div class="sl-content px-10 py-10">

      <div>
        <span class="inline-block bg-red-900 text-white text-xs font-bold tracking-widest uppercase px-3 py-1 rounded mb-7">
          Browser Horror · Escape Game
        </span>
        <p class="text-4xl font-black text-slate-900 tracking-tight mb-2">Horror Bangla</p>
        <h1 class="sl-headline font-black text-slate-900 leading-tight mb-5">
          You're Trapped.<br/>
          <span class="text-red-800">Find the Exit.</span>
        </h1>
        <p class="text-base text-slate-600 leading-relaxed max-w-xs">
          Locked inside a dark bungalow. Rooms full of secrets. Puzzles standing between you and freedom. Can you escape before the night ends?
        </p>
      </div>

      <div>
        <div class="flex flex-wrap gap-2 mb-4">
          <span class="bg-slate-100 text-slate-700 text-xs px-3 py-1 rounded-full font-medium">No Download</span>
          <span class="bg-slate-100 text-slate-700 text-xs px-3 py-1 rounded-full font-medium">No Account</span>
          <span class="bg-red-100 text-red-800   text-xs px-3 py-1 rounded-full font-medium">Pure Horror</span>
        </div>
        <data-attribution />
      </div>

    </div>

    <!-- Visual column -->
    <div class="sl-visual relative overflow-hidden">
      <img
        src="https://api.qb-deck.quantumbyte.ai/common/image-generation?prompt=haunted+bungalow+exterior+at+night+dark+foggy+single+dim+light+glowing+in+window+horror+cinematic+atmospheric+moonlit"
        alt="Dark haunted bungalow at night"
        class="w-full h-full object-cover"
      />
      <!-- Feather edge toward content -->
      <div class="absolute inset-y-0 left-0 w-16" style="background: linear-gradient(to right, white, transparent);"></div>
    </div>

  </div>
</section>
